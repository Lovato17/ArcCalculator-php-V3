; -------------------------------------------------------
; Limites para upload de arquivos grandes (Cost Management exports)
; Este arquivo é lido automaticamente pelo PHP built-in server a partir do document root.
; -------------------------------------------------------

; Tamanho máximo do arquivo enviado via upload
upload_max_filesize = 200M

; Tamanho máximo do corpo POST (deve ser >= upload_max_filesize)
post_max_size = 210M

; Limite de memória para processamento
memory_limit = 256M

; Tempo máximo de execução (CSV grande + consultas à API)
max_execution_time = 300

; Tempo máximo de espera do input
max_input_time = 300
